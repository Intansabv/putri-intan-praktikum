<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector - Modul 7 CSS</title>
    <style>
        p.error {
            color: green;
            background: #f0fff0;
            padding: 10px;
            border: 1px solid green;
            border-radius: 5px;
        }
        
        p.success {
            color: #27ae60;
            background: #e8f8f5;
            padding: 10px;
            border: 1px solid #27ae60;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h2>Contoh Class Selector</h2>
    <p>Ini Paragraph normal.</p>
    <p class="error">Ini paragraph setelan class error.</p>
    <p>Ini paragraph normal lagi.</p>
    <p class="error">Ini paragraph setelan class error.</p>
    <p class="success">Ini paragraph dengan class success.</p>
</body>
</html>
