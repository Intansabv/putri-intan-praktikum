<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>embedded_styles - Modul 7 CSS</title>
    <style>
        h1 {
            color: blue;
            font-family: verdana;
            font-size: 300%;
        }
        p {
            color: red;
            font-family: courier;
            font-size: 160%;
        }
    </style>
</head>
<body>
    <h1>Judul dengan Embedded Styles</h1>
    <p>Paragraph dengan style embedded CSS.</p>
    <p>Ini adalah contoh penggunaan embedded styles dalam CSS.</p>
</body>
</html>
