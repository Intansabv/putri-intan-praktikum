<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Tabel - Modul 7 CSS</title>
    <style>
        table, th, td {
            border: 1px solid black;
            border-collapse: collapse;
            padding: 15px;
            text-align: left;
        }
        
        table#t01 {
            width: 100%;
            background-color: #f1f1c1;
        }
        
        table.names {
            width: 100%;
            background-color: #e8f4f8;
            margin-top: 20px;
        }
        
        th {
            background-color: #3498db;
            color: white;
        }
        
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <h2>Styling Tabel dengan CSS</h2>
    
    <h3>Tabel Standar</h3>
    <table style="width:100%">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Rusi</td>
            <td>Anandi</td>
            <td>17</td>
        </tr>
        <tr>
            <td>Putri</td>
            <td>Intan</td>
            <td>20</td>
        </tr>
    </table>

    <h3>Tabel dengan ID Selector</h3>
    <table id="t01">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Novya</td>
            <td>Selena</td>
            <td>18</td>
        </tr>
        <tr>
            <td>Budi</td>
            <td>Santoso</td>
            <td>22</td>
        </tr>
    </table>

    <h3>Tabel dengan Class Selector</h3>
    <table class="names">
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Ani</td>
            <td>Wati</td>
            <td>19</td>
        </tr>
        <tr>
            <td>Joko</td>
            <td>Widodo</td>
            <td>25</td>
        </tr>
    </table>
</body>
</html>
